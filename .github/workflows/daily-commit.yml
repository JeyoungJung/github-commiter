name: Daily Green Square

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Random commits
        run: |
          git config user.name "JeyoungJung"
          git config user.email "70983545+JeyoungJung@users.noreply.github.com"
          COMMIT_COUNT=$((RANDOM % 6))
          echo "Making $COMMIT_COUNT commit(s) today"
          if [ "$COMMIT_COUNT" -eq 0 ]; then
            echo "Rest day, no commits"
            exit 0
          fi
          for i in $(seq 1 $COMMIT_COUNT); do
            bash commit.sh
            git add -A
            git commit -m "$(date -u +%Y-%m-%d) quote #$i"
            sleep 1
          done
          git push
